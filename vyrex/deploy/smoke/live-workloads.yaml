# Minimal real-workload deployment for the k3d smoke test: the actual vyrex api +
# console images (imported into the cluster) plus a Postgres they bind to. Proves the built
# images run as real pods on a real K8s cluster. Service names match the images' expectations
# (the console's nginx proxies /api -> http://api:8000; the api defaults to host 'postgres').
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: soc-live, labels: { app: postgres } }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_USER, value: soc }
            - { name: POSTGRES_PASSWORD, value: soc }
            - { name: POSTGRES_DB, value: soc_central }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "soc", "-d", "soc_central"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: soc-live }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: soc-live, labels: { app: api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      enableServiceLinks: false # don't inject legacy POSTGRES_PORT=tcp://... env (clobbers config)
      containers:
        - name: api
          image: vyrex-api:latest
          imagePullPolicy: IfNotPresent # use the image imported into k3d, never pull
          env:
            - { name: POSTGRES_HOST, value: postgres }
            - { name: POSTGRES_PASSWORD, value: soc }
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: soc-live }
spec:
  selector: { app: api }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: console, namespace: soc-live, labels: { app: console } }
spec:
  replicas: 1
  selector: { matchLabels: { app: console } }
  template:
    metadata: { labels: { app: console } }
    spec:
      containers:
        - name: console
          image: vyrex-console:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: console, namespace: soc-live }
spec:
  selector: { app: console }
  ports: [{ port: 8080, targetPort: 8080 }]
