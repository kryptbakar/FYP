apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soc.fullname" . }}-api
  labels: {{- include "soc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: {{- include "soc.selector" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "soc.selector" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "soc.fullname" . }}
      securityContext: {{- include "soc.podSecurity" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "soc.image" (dict "root" . "name" .Values.api.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext: {{- include "soc.containerSecurity" . | nindent 12 }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          ports: [{ containerPort: {{ .Values.api.port }} }]
          envFrom:
            - configMapRef: { name: {{ include "soc.fullname" . }}-config }
            - secretRef: { name: soc-db }
            - secretRef: { name: soc-opensearch }
            - secretRef: { name: soc-command-signing }
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health/ready, port: {{ .Values.api.port }} }
            initialDelaySeconds: 8
            periodSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "soc.fullname" . }}-api
  labels: {{- include "soc.labels" . | nindent 4 }}
spec:
  selector: {{- include "soc.selector" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
