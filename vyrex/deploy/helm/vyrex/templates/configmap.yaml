apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soc.fullname" . }}-config
  labels: {{- include "soc.labels" . | nindent 4 }}
data:
  # Non-secret runtime config. Secrets (passwords, tokens, keys) come from Vault.
  SOC_ENV: "production"
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  OPENSEARCH_HOST: {{ .Values.opensearch.host | quote }}
  OPENSEARCH_PORT: {{ .Values.opensearch.port | quote }}
  OPENSEARCH_SCHEME: {{ .Values.opensearch.scheme | quote }}
  NATS_URL: {{ .Values.nats.url | quote }}
  API_LOG_LEVEL: "info"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "soc.fullname" . }}
  labels: {{- include "soc.labels" . | nindent 4 }}
automountServiceAccountToken: false
