# =====================================================================
# SOC Central Helm values — air-gapped K3s production defaults.
# Override per-site with `-f values-<site>.yaml`. Secrets are NOT here:
# they come from Vault via External Secrets (see vault.* + deploy/vault/).
# =====================================================================

global:
  # All images are pulled from the on-prem mirror registry (no internet at runtime).
  imageRegistry: registry.soc.local
  imageTag: "1.0.0"
  imagePullPolicy: IfNotPresent
  storageClass: local-path          # k3s default; swap for the site's CSI

# Ingress / external access (inbound from the trusted LAN only).
ingress:
  enabled: true
  className: traefik                 # k3s ships Traefik
  host: soc.internal
  tls:
    enabled: true
    secretName: vyrex-tls      # provisioned by cert-manager / Vault PKI
  # When true, the console+API ingress sits behind oauth2-proxy (Keycloak OIDC).
  oidcProtected: true

# ---- product workloads ----------------------------------------------------
api:
  replicas: 2
  image: vyrex-api
  port: 8000
  resources: { requests: { cpu: 100m, memory: 192Mi }, limits: { cpu: "1", memory: 512Mi } }

console:
  replicas: 2
  image: vyrex-console
  port: 8080
  resources: { requests: { cpu: 25m, memory: 32Mi }, limits: { cpu: 200m, memory: 128Mi } }

workers:
  replicas: 3                        # scale with stream throughput
  image: vyrex-workers
  resources: { requests: { cpu: 100m, memory: 192Mi }, limits: { cpu: "1", memory: 512Mi } }

ingestEdge:
  replicas: 2
  image: vyrex-ingest-edge
  port: 8443                         # mTLS telemetry listener
  resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: "1", memory: 384Mi } }

# ---- scheduled jobs -------------------------------------------------------
jobs:
  # feed-sync is the AIR-GAPPED UPDATE CHANNEL: the only workload allowed egress,
  # and only to the mirror sources. Runs weekly; --from-cache at a true air-gap site.
  feedSync:
    image: vyrex-feed-sync
    schedule: "0 3 * * 1"            # Mon 03:00
    args: ["--feeds", "kev,epss,nvd"]
    allowEgress: true               # the ONE exception in the NetworkPolicy
  enrichment:
    image: vyrex-enrichment
    schedule: "0 */6 * * *"          # every 6h
    args: ["--once"]
  riskEngine:
    image: vyrex-risk-engine
    schedule: "30 4 1 * *"           # monthly retrain (1st, 04:30) — feeds the loop
    args: ["train"]
    score:
      schedule: "0 5 * * *"          # daily scoring
      args: ["score"]

# ---- backing services (endpoints; the resources live in deploy/databases) --
postgres:
  host: soc-pg-rw                    # CloudNativePG read-write service
  port: 5432
  database: soc_central
opensearch:
  host: soc-opensearch
  port: 9200
  scheme: https
nats:
  url: nats://soc-nats:4222

# ---- Vault-backed secrets (External Secrets Operator) ---------------------
vault:
  enabled: true
  secretStoreRef: soc-vault          # ClusterSecretStore name (deploy/vault/)
  # logical Vault paths -> k8s Secrets the workloads mount
  paths:
    db: secret/data/soc/db
    opensearch: secret/data/soc/opensearch
    agentToken: secret/data/soc/ingest
    signingKey: secret/data/soc/command-signing

# ---- security context applied to every pod --------------------------------
podSecurity:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  seccompProfile: RuntimeDefault
