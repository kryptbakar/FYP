# oauth2-proxy fronts the console+API ingress with Keycloak OIDC, so every request
# to https://soc.internal/ is authenticated before it reaches a SOC Central pod.
# RBAC: the realm roles arrive as a `groups` claim; the API authorizes per-route
# (e.g. response-action approval requires soc-admin). This closes the OIDC/SSO + RBAC
# item deferred from Phase G.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-oauth2-proxy
  namespace: vyrex
spec:
  replicas: 2
  selector: { matchLabels: { app: soc-oauth2-proxy } }
  template:
    metadata: { labels: { app: soc-oauth2-proxy } }
    spec:
      containers:
        - name: oauth2-proxy
          image: registry.soc.local/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://keycloak.soc.internal/realms/vyrex
            - --client-id=soc-console
            - --redirect-url=https://soc.internal/oauth2/callback
            - --upstream=http://soc-vyrex-console:8080
            - --scope=openid profile email roles
            - --allowed-group=SOC Admins
            - --allowed-group=SOC Analysts
            - --allowed-group=SOC Viewers
            - --cookie-secure=true
            - --email-domain=*
            - --http-address=0.0.0.0:4180
          envFrom:
            - secretRef: { name: soc-oauth2 }   # client secret + cookie secret (Vault)
          ports: [{ containerPort: 4180 }]
---
apiVersion: v1
kind: Service
metadata: { name: soc-oauth2-proxy, namespace: vyrex }
spec:
  selector: { app: soc-oauth2-proxy }
  ports: [{ port: 4180, targetPort: 4180 }]
---
# Traefik forward-auth middleware referenced by the Ingress annotation (soc-oidc).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: soc-oidc, namespace: vyrex }
spec:
  forwardAuth:
    address: http://soc-oauth2-proxy:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Groups"]
