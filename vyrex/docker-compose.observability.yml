# Observability stack — Prometheus (metrics) + Loki (logs) + promtail (shipper).
# Opt-in overlay so the core stack stays light:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# Grafana (in the core compose) already has Prometheus + Loki datasources provisioned.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: vyrex-prometheus-1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [socnet]

  loki:
    image: grafana/loki:3.3.2
    container_name: vyrex-loki-1
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks: [socnet]

  promtail:
    image: grafana/promtail:3.3.2
    container_name: vyrex-promtail-1
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [socnet]

volumes:
  prometheus_data:
  loki_data:

networks:
  socnet:
    external: true
    name: vyrex_default
