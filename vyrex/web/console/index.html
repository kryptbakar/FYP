<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VYREX — Analyst Console</title>
  <meta name="description" content="VYREX — explainable, air-gapped security intelligence workspace." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23A82A47' d='M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5z'/></svg>" />
  <link rel="stylesheet" href="assets/app.css?v=9" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/><path d="m9 11.5 2 2 4-4.5" stroke-linecap="round"/></svg></div>
        <div><div class="nm">VYREX</div><div class="tl">Security Intelligence</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="spring"></div>
      <div class="foot">
        <div class="row" style="gap:7px"><span class="statdot active" id="store-dot"></span><span id="store-stat">stores —</span></div>
        <div>model <span class="mono" id="model-ver">—</span></div>
        <div>evidence <span class="mono" id="chain-stat">—</span></div>
        <div class="faint" style="margin-top:4px">v<span id="api-ver">—</span> · air-gapped</div>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <div>
          <h1 id="title">Triage</h1>
          <div class="crumb" id="crumb">Ranked decisions</div>
        </div>
        <div class="spring"></div>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
          <input id="q" placeholder="Search findings, assets, CVEs…" aria-label="search findings, assets and CVEs" />
          <span class="slash" title="press / to focus search">/</span>
        </div>
        <div class="orgchip" id="orgchip" title="organization"></div>
        <button class="iconbtn" id="density" title="toggle table density" aria-label="toggle table density">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="6.5" rx="1.5"/><rect x="3" y="13.5" width="18" height="6.5" rx="1.5"/></svg>
        </button>
        <button class="iconbtn" id="bell" title="alerts" aria-label="alerts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="nbadge" id="bell-badge" hidden></span>
        </button>
        <div class="live" id="live"><span class="dot"></span><span id="live-label">connecting…</span></div>
        <div class="userchip" id="userchip" title="signed-in user"></div>
      </header>
      <div class="alerts-pop" id="alerts-pop" hidden></div>
      <div class="scroll" id="scroll"><div class="view" id="view"></div></div>
    </main>
  </div>

  <div class="cmdk" id="cmdk" hidden>
    <div class="cmdk-card">
      <div class="cmdk-top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="cmdk-input" placeholder="Jump to a page…" aria-label="command palette" autocomplete="off" />
        <span class="kbd">esc</span>
      </div>
      <div class="cmdk-list" id="cmdk-list"></div>
      <div class="cmdk-foot"><span><span class="kbd">↑↓</span> navigate</span><span><span class="kbd">↵</span> open</span><span><span class="kbd">⌘K</span> palette</span></div>
    </div>
  </div>

  <div class="login" id="login" hidden>
    <form class="login-card" id="login-form" autocomplete="off">
      <div class="login-brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/><path d="m9 11.5 2 2 4-4.5" stroke-linecap="round"/></svg></div>
        <div><div class="nm">VYREX</div><div class="tl">Security Intelligence</div></div>
      </div>
      <label>Username<input id="login-user" autocomplete="username" /></label>
      <label>Password<input id="login-pass" type="password" autocomplete="current-password" /></label>
      <div class="login-err" id="login-err"></div>
      <button class="btn primary" type="submit" id="login-go">Sign in</button>
      <div class="login-hint">Demo: <b>admin</b> / <b>analyst</b> / <b>viewer</b> · password <b>vyrex</b></div>
    </form>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"><div id="drawer-inner" style="display:flex;flex-direction:column;height:100%"></div></aside>
  <div class="toast" id="toast"></div>

  <script src="assets/fixtures.js?v=9"></script>
  <script src="assets/api.js?v=9"></script>
  <script src="assets/ui.js?v=9"></script>
  <script src="assets/toolkit.js?v=9"></script>
  <script src="assets/views.js?v=9"></script>
  <script src="assets/app.js?v=9"></script>
  <script src="assets/story.js?v=9"></script>
</body>
</html>
