# Grafana datasource provisioning.
# Wires Grafana to the two SQL stores. Stable UIDs let the provisioned dashboards
# (Phase G / grafana/dashboards/*.json) reference them deterministically.
#
# NOTE (air-gap): an OpenSearch datasource needs the grafana-opensearch-datasource
# plugin, whose install pulls from the internet — incompatible with the air gap unless
# the plugin is mirrored. So the Phase-G dashboards run on the built-in `postgres`
# datasource (the rich findings/risk/compliance data lives in Postgres anyway). The
# OpenSearch log dashboards are deferred until the plugin is mirrored (see PHASE-G-NOTES).
apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: soc-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    # Grafana provisioning does NOT support bash-style ${VAR:-default}; it would treat the
    # whole "VAR:-default" as the env name and resolve to empty. Use plain ${VAR} (the grafana
    # container is given these in docker-compose.yml).
    user: ${POSTGRES_USER}
    isDefault: true
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    editable: true

  - name: TimescaleDB
    uid: soc-timescale
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: ${TIMESCALE_USER}
    jsonData:
      database: ${TIMESCALE_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: ${TIMESCALE_PASSWORD}
    editable: true

  # Observability stack (only reachable when docker-compose.observability.yml is up).
  # Prometheus scrapes the API /metrics; Loki holds container logs via promtail.
  - name: Prometheus
    uid: soc-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: true

  - name: Loki
    uid: soc-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
