# External Secrets Operator → projects Vault KV paths into the k8s Secrets the chart
# mounts. This is how the secret list in docs/AIRGAP.md §5 reaches the workloads
# WITHOUT any secret ever sitting in git, an image, or a .env.
#
# helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: soc-vault
spec:
  provider:
    vault:
      server: "https://vault.vault.svc:8200"
      path: secret
      version: v2
      caProvider: { type: Secret, name: vault-tls, key: ca.crt, namespace: vault }
      auth:
        kubernetes:
          mountPath: kubernetes      # Vault k8s auth method
          role: soc-central
          serviceAccountRef: { name: soc-central-soc-central }
---
# Database credentials (CloudNativePG bootstrap + API/workers/jobs).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: soc-db
  namespace: soc-central
spec:
  refreshInterval: 1h
  secretStoreRef: { name: soc-vault, kind: ClusterSecretStore }
  target: { name: soc-db, creationPolicy: Owner }
  data:
    - { secretKey: POSTGRES_USER,     remoteRef: { key: soc/db, property: username } }
    - { secretKey: POSTGRES_PASSWORD, remoteRef: { key: soc/db, property: password } }
    - { secretKey: username,          remoteRef: { key: soc/db, property: username } }
    - { secretKey: password,          remoteRef: { key: soc/db, property: password } }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: soc-opensearch, namespace: soc-central }
spec:
  refreshInterval: 1h
  secretStoreRef: { name: soc-vault, kind: ClusterSecretStore }
  target: { name: soc-opensearch, creationPolicy: Owner }
  data:
    - { secretKey: OPENSEARCH_USER,     remoteRef: { key: soc/opensearch, property: username } }
    - { secretKey: OPENSEARCH_PASSWORD, remoteRef: { key: soc/opensearch, property: password } }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: soc-ingest, namespace: soc-central }
spec:
  refreshInterval: 1h
  secretStoreRef: { name: soc-vault, kind: ClusterSecretStore }
  target: { name: soc-ingest, creationPolicy: Owner }
  data:
    - { secretKey: INGEST_AGENT_TOKEN, remoteRef: { key: soc/ingest, property: agent-token } }
---
# Ed25519 command-signing key (the highest-value secret). Agents hold only the public key.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: soc-command-signing, namespace: soc-central }
spec:
  refreshInterval: 1h
  secretStoreRef: { name: soc-vault, kind: ClusterSecretStore }
  target: { name: soc-command-signing, creationPolicy: Owner }
  data:
    - { secretKey: COMMAND_SIGNING_KEY, remoteRef: { key: soc/command-signing, property: private-key } }
