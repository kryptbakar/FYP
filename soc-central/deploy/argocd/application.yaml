# ArgoCD GitOps: the cluster continuously reconciles to this chart in git. In an
# air-gapped site ArgoCD points at the ON-PREM git mirror, and images come from the
# on-prem registry — so a "deploy" is a git push to the internal mirror, never an
# internet pull. This makes the platform's desired state auditable and reproducible.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-central
  namespace: argocd
  finalizers: ["resources-finalizer.argocd.argoproj.io"]
spec:
  project: default
  source:
    repoURL: https://git.soc.internal/kryptbakar/FYP.git   # on-prem mirror
    targetRevision: main
    path: soc-central/deploy/helm/soc-central
    helm:
      valueFiles: ["values.yaml", "values-prod.yaml"]
  destination:
    server: https://kubernetes.default.svc
    namespace: soc-central
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true", "ApplyOutOfSyncOnly=true"]
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
