# Weekly scheduled posture report (CSV + HTML) written to a shared PVC.
# A downstream step (email relay / object-store sync) can ship the artifacts; kept
# decoupled so the air-gapped site chooses its own delivery.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: soc-scheduled-report
  namespace: soc-central
spec:
  schedule: "0 6 * * 1" # 06:00 every Monday
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: report
              image: registry.soc.local/soc-central/toolbox:1.0.0 # has curl + jq + bash
              command: ["/bin/bash", "/scripts/generate-report.sh"]
              env:
                - { name: API, value: "http://soc-api.soc-central.svc:8000" }
                - { name: OUT, value: "/reports" }
              volumeMounts:
                - { name: scripts, mountPath: /scripts, readOnly: true }
                - { name: reports, mountPath: /reports }
          volumes:
            - name: scripts
              configMap:
                name: soc-report-scripts
                defaultMode: 0755
            - name: reports
              persistentVolumeClaim:
                claimName: soc-reports
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soc-reports
  namespace: soc-central
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
