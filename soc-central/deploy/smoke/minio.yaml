# MinIO as Velero's S3-compatible backup store (lab). Mirrors the production design where
# Velero backs up to MinIO (deploy/backup). A one-shot job pre-creates the 'velero' bucket.
apiVersion: v1
kind: Namespace
metadata: { name: velero }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: minio, namespace: velero, labels: { app: minio } }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: minio }
            - { name: MINIO_ROOT_PASSWORD, value: minio123 }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: velero }
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: batch/v1
kind: Job
metadata: { name: minio-mkbucket, namespace: velero }
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set m http://minio:9000 minio minio123; do echo waiting for minio; sleep 3; done
              mc mb -p m/velero || true
              mc ls m/
