<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOC Central — Analyst Console</title>
  <meta name="description" content="SOC Central — explainable, air-gapped security intelligence workspace." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%234F8CFF' d='M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5z'/></svg>" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/><path d="m9 11.5 2 2 4-4.5" stroke-linecap="round"/></svg></div>
        <div><div class="nm">SOC Central</div><div class="tl">Intelligence</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="spring"></div>
      <div class="foot">
        <div class="row" style="gap:7px"><span class="statdot active" id="store-dot"></span><span id="store-stat">stores —</span></div>
        <div>model <span class="mono" id="model-ver">—</span></div>
        <div>evidence <span class="mono" id="chain-stat">—</span></div>
        <div class="faint" style="margin-top:4px">v<span id="api-ver">—</span> · air-gapped</div>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <div>
          <h1 id="title">Triage</h1>
          <div class="crumb" id="crumb">Ranked decisions</div>
        </div>
        <div class="spring"></div>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
          <input id="q" placeholder="Search findings, assets, CVEs…" />
          <span class="slash">/</span>
        </div>
        <div class="live" id="live"><span class="dot"></span><span id="live-label">connecting…</span></div>
      </header>
      <div class="scroll" id="scroll"><div class="view" id="view"></div></div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"><div id="drawer-inner" style="display:flex;flex-direction:column;height:100%"></div></aside>
  <div class="toast" id="toast"></div>

  <script src="assets/fixtures.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/views.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
