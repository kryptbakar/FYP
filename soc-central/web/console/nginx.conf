# SOC Central console — nginx serves the static SPA and reverse-proxies the API.
# Serving the console and the API under ONE origin means the browser makes same-origin
# calls (/api/...) — no CORS, no API host baked into the client, and nothing egresses.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA assets — revalidate every load (filenames aren't content-hashed, so a 1h cache
    # served stale JS after a rebuild). no-cache lets the browser 304 when unchanged.
    location /assets/ {
        add_header Cache-Control "no-cache" always;
    }

    # API reverse proxy -> FastAPI (same Docker network). Strip the /api prefix.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Client-side routing: always fall back to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Light hardening for a UI surface.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
}
